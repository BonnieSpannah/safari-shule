name: safari-shule

networks:
  safari:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  glitchtip_data:

services:
  # ---------------------------------------------------------------
  # PostgreSQL 16 with PostGIS extension
  # ---------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: safari-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [safari]

  # ---------------------------------------------------------------
  # PgBouncer (transaction-mode pooling)
  # ---------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: safari-pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [safari]

  # ---------------------------------------------------------------
  # Redis 7 (cache, BullMQ, geospatial)
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: safari-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [safari]

  # ---------------------------------------------------------------
  # SMTP catcher for dev (Mailhog)
  # ---------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: safari-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks: [safari]

  # ---------------------------------------------------------------
  # NestJS API
  # ---------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: safari-api
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?schema=public&pgbouncer=true&connection_limit=20
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "${API_PORT}:3000"
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [safari]

  # ---------------------------------------------------------------
  # React web (Vite dev server in containers; production uses nginx)
  # ---------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    container_name: safari-web
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://safari-api:3000
    volumes:
      # Mount only the source tree so Vite HMR works without rebuilding the image.
      # node_modules stay inside the container (installed at image build time).
      - ../apps/web/src:/workspace/apps/web/src:cached
    ports:
      - "${WEB_PORT}:5173"
    depends_on:
      - api
    networks: [safari]

  # ---------------------------------------------------------------
  # Nginx subdomain-aware reverse proxy
  # ---------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: safari-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks: [safari]

  # ---------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: safari-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [safari]

  # ---------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: safari-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks: [safari]

  # ---------------------------------------------------------------
  # GlitchTip (lightweight Sentry-compatible error tracking)
  # ---------------------------------------------------------------
  glitchtip:
    image: glitchtip/glitchtip:v4.1
    container_name: safari-glitchtip
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      SECRET_KEY: change-me-glitchtip-secret
      PORT: "8000"
      EMAIL_URL: smtp://mailhog:1025
      GLITCHTIP_DOMAIN: http://localhost:8001
      DEFAULT_FROM_EMAIL: glitchtip@safarishule.test
      CELERY_WORKER_AUTOSCALE: "1,3"
    ports:
      - "8001:8000"
    volumes:
      - glitchtip_data:/code/uploads
    depends_on:
      - postgres
      - redis
    networks: [safari]
