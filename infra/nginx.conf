worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    map $host $tenant_slug {
        default              "";
        "~^(?<sub>[^.]+)\.safarishule\.local$" $sub;
    }

    upstream api_upstream { server api:3000; }
    upstream web_upstream { server web:5173; }

    # Admin web served from any tenant subdomain
    server {
        listen 80;
        server_name ~^(?<sub>[^.]+)\.safarishule\.local$ safarishule.local;

        location /v1/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-Slug     $tenant_slug;
            proxy_set_header   X-Request-ID      $request_id;
        }

        location /ws/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Tenant-Slug     $tenant_slug;
            proxy_read_timeout 3600;
        }

        location / {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
